services:
  - type: web
    name: newsletter-curator-frontend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0 --server.enableCORS false --server.enableXsrfProtection false"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Set this in the Render dashboard to your already-deployed backend URL:
      #   BACKEND_URL = https://personal-newsletter-curator.onrender.com
